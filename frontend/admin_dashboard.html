<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - E-Commerce API Testing Suite</title>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Additional styles for inventory button */
        .inventory-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .btn-inventory {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-inventory:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(40,167,69,0.4);
        }
        
        .btn-hide {
            background: linear-gradient(135deg, #6c757d 0%, #495057 100%);
        }
        
        .btn-hide:hover {
            box-shadow: 0 5px 15px rgba(108,117,125,0.4);
        }
        
        .inventory-stats {
            background: #f8f9fa;
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: inline-block;
        }
        
        .inventory-stats i {
            color: #28a745;
            margin-right: 8px;
        }
        
        .product-count {
            font-weight: bold;
            color: #667eea;
            font-size: 18px;
        }

        .error-message {
            color: #dc3545;
            font-size: 12px;
            margin-top: 5px;
        }

        .form-group input.error,
        .form-group textarea.error {
            border-color: #dc3545;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <script>
        // ============================================================
        // LOGIN CHECK - MODIFIED FOR TESTING
        // ============================================================
        
        // For testing - bypass login (comment out for production)
        if (!localStorage.getItem('admin_logged_in')) {
            localStorage.setItem('admin_logged_in', 'true');
            localStorage.setItem('admin_email', 'test@example.com');
            localStorage.setItem('admin_name', 'Test Admin');
        }
        
        // Original login check - uncomment for production
        // if (!localStorage.getItem('admin_logged_in')) {
        //     window.location.href = 'admin_login.html';
        // }
    </script>

    <div class="container">
        <!-- Header with Logo -->
        <div class="header">
            <div style="display: flex; align-items: center; gap: 15px;">
                <!-- Logo -->
                <div style="width: 55px; height: 55px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 12px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(102,126,234,0.3);">
                    <i class="fas fa-store" style="color: white; font-size: 28px;"></i>
                </div>
                <div>
                    <h1 style="margin: 0; font-size: 24px;">Admin Dashboard</h1>
                    <p style="margin: 0; font-size: 12px; color: #888; margin-top: 4px;">
                        <i class="fas fa-flask"></i> API Testing Suite | 
                        <i class="fas fa-database"></i> RESTful CRUD Operations
                    </p>
                </div>
            </div>
            <div style="display: flex; align-items: center; gap: 20px;">
                <span style="display: flex; align-items: center; gap: 8px;">
                    <i class="fas fa-user-shield" style="color: #667eea;"></i>
                    <span id="adminName">Admin</span>
                </span>
                <span style="background: #f0f0f0; padding: 6px 14px; border-radius: 20px; font-size: 12px; color: #555;">
                    <i class="fas fa-code-branch"></i> API: /backend/api/products.php
                </span>
                <button id="logoutBtn" onclick="logout()" style="background: #dc3545; color: white; border: none; padding: 6px 12px; border-radius: 8px; cursor: pointer;">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </div>

        <!-- Alert Messages -->
        <div id="alert" class="alert"></div>

        <!-- Add Product Form Card -->
        <div class="form-card">
            <h2><i class="fas fa-plus-circle" style="color: #667eea;"></i> Add New Product</h2>
            <form id="addProductForm">
                <div class="form-group">
                    <label><i class="fas fa-tag"></i> Product Name *</label>
                    <input type="text" id="productName" placeholder="Enter product name" required>
                    <div id="nameError" class="error-message"></div>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-align-left"></i> Description</label>
                    <textarea id="productDesc" rows="3" placeholder="Enter product description"></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label><i class="fas fa-dollar-sign"></i> Price *</label>
                        <input type="number" step="0.01" id="productPrice" placeholder="0.00" required>
                        <div id="priceError" class="error-message"></div>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-boxes"></i> Quantity</label>
                        <input type="number" id="productQty" value="0" placeholder="0">
                        <div id="quantityError" class="error-message"></div>
                    </div>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-folder"></i> Category</label>
                    <select id="productCat">
                        <option value="Electronics">Electronics</option>
                        <option value="Clothing">Clothing</option>
                        <option value="Books">Books</option>
                        <option value="Home">Home & Living</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary" id="submitBtn">
                    <i class="fas fa-save"></i> Add Product
                </button>
            </form>
        </div>

        <!-- Products List Card with View Inventory Button -->
        <div class="products-card">
            <div class="inventory-header">
                <h2><i class="fas fa-boxes" style="color: #667eea;"></i> Product Inventory</h2>
                <button id="toggleInventoryBtn" class="btn-inventory">
                    <i class="fas fa-eye"></i> View Inventory
                </button>
            </div>
            
            <!-- Inventory Section (Hidden by default) -->
            <div id="inventorySection" style="display: none;">
                <div class="inventory-stats">
                    <i class="fas fa-chart-line"></i>
                    Total Products: <span id="totalProducts" class="product-count">0</span>
                </div>
                <div class="table-wrapper">
                    <table id="productsTable">
                        <thead>
                            <tr>
                                <th><i class="fas fa-hashtag"></i> ID</th>
                                <th><i class="fas fa-tag"></i> Name</th>
                                <th><i class="fas fa-align-left"></i> Description</th>
                                <th><i class="fas fa-dollar-sign"></i> Price</th>
                                <th><i class="fas fa-boxes"></i> Qty</th>
                                <th><i class="fas fa-folder"></i> Category</th>
                                <th><i class="fas fa-cogs"></i> Actions</th>
                            </tr>
                        </thead>
                        <tbody id="productsTableBody">
                            <tr class="empty-row">
                                <td colspan="7">
                                    <i class="fas fa-eye"></i> Click "View Inventory" to load products...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-edit" style="color: #ffc107;"></i> Edit Product</h3>
                <span class="close-modal" onclick="closeEditModal()">&times;</span>
            </div>
            <form id="editProductForm">
                <input type="hidden" id="editProductId">
                <div class="form-group">
                    <label><i class="fas fa-tag"></i> Product Name</label>
                    <input type="text" id="editName" required>
                    <div id="editNameError" class="error-message"></div>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-align-left"></i> Description</label>
                    <textarea id="editDesc" rows="3"></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label><i class="fas fa-dollar-sign"></i> Price</label>
                        <input type="number" step="0.01" id="editPrice" required>
                        <div id="editPriceError" class="error-message"></div>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-boxes"></i> Quantity</label>
                        <input type="number" id="editQty">
                        <div id="editQuantityError" class="error-message"></div>
                    </div>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-folder"></i> Category</label>
                    <select id="editCat">
                        <option value="Electronics">Electronics</option>
                        <option value="Clothing">Clothing</option>
                        <option value="Books">Books</option>
                        <option value="Home">Home & Living</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save"></i> Update Product
                </button>
            </form>
        </div>
    </div>

    <script>
        // API URL
        const API_URL = 'http://localhost/ecommerce_api/backend/api/products.php';
        
        // Variables
        let inventoryVisible = false;
        let productsData = [];
        
        // Display admin name
        function displayAdminName() {
            const name = localStorage.getItem('admin_name');
            const adminNameSpan = document.getElementById('adminName');
            if (name && adminNameSpan) {
                adminNameSpan.textContent = name;
            }
        }
        
        // Show alert message
        function showAlert(message, type) {
            const alertDiv = document.getElementById('alert');
            if (alertDiv) {
                alertDiv.textContent = message;
                alertDiv.className = `alert alert-${type}`;
                setTimeout(() => {
                    alertDiv.className = 'alert';
                }, 3000);
            }
        }
        
        // Validate product inputs (client-side)
        function validateProduct(price, quantity, isEdit = false) {
            let isValid = true;
            
            if (!isEdit) {
                const name = document.getElementById('productName').value.trim();
                const nameError = document.getElementById('nameError');
                if (!name) {
                    nameError.textContent = 'Product name is required';
                    isValid = false;
                } else {
                    nameError.textContent = '';
                }
            } else {
                const name = document.getElementById('editName').value.trim();
                const nameError = document.getElementById('editNameError');
                if (!name) {
                    nameError.textContent = 'Product name is required';
                    isValid = false;
                } else {
                    nameError.textContent = '';
                }
            }
            
            // Validate price
            const priceError = isEdit ? document.getElementById('editPriceError') : document.getElementById('priceError');
            if (!price || price <= 0) {
                priceError.textContent = 'Price must be greater than 0';
                isValid = false;
            } else if (isNaN(price)) {
                priceError.textContent = 'Price must be a valid number';
                isValid = false;
            } else {
                priceError.textContent = '';
            }
            
            // Validate quantity
            const quantityError = isEdit ? document.getElementById('editQuantityError') : document.getElementById('quantityError');
            if (quantity < 0) {
                quantityError.textContent = 'Quantity cannot be negative';
                isValid = false;
            } else if (isNaN(quantity)) {
                quantityError.textContent = 'Quantity must be a valid number';
                isValid = false;
            } else {
                quantityError.textContent = '';
            }
            
            return isValid;
        }
        
        // Toggle Inventory Function
        function toggleInventory() {
            const inventorySection = document.getElementById('inventorySection');
            const toggleBtn = document.getElementById('toggleInventoryBtn');
            
            if (!inventoryVisible) {
                inventorySection.style.display = 'block';
                toggleBtn.innerHTML = '<i class="fas fa-eye-slash"></i> Hide Inventory';
                toggleBtn.classList.add('btn-hide');
                loadProductsForInventory();
                inventoryVisible = true;
            } else {
                inventorySection.style.display = 'none';
                toggleBtn.innerHTML = '<i class="fas fa-eye"></i> View Inventory';
                toggleBtn.classList.remove('btn-hide');
                inventoryVisible = false;
            }
        }
        
        // Load products specifically for inventory
        async function loadProductsForInventory() {
            const tbody = document.getElementById('productsTableBody');
            tbody.innerHTML = '<tr><td colspan="7" class="loading"><i class="fas fa-spinner fa-pulse"></i> Loading products...</td></tr>';
            
            try {
                const response = await fetch(API_URL);
                const result = await response.json();
                
                if (result.status === 'success') {
                    productsData = result.data;
                    const totalSpan = document.getElementById('totalProducts');
                    if (totalSpan) totalSpan.textContent = productsData.length;
                    displayProductsInTable(productsData);
                } else {
                    tbody.innerHTML = '<tr class="empty-row"><td colspan="7">📭 No products found. Add your first product above!</td></tr>';
                }
            } catch (error) {
                console.error('Error loading products:', error);
                tbody.innerHTML = '<tr class="empty-row"><td colspan="7">❌ Error loading products. Make sure XAMPP is running.</td></tr>';
            }
        }
        
        // Display products in table
        function displayProductsInTable(products) {
            const tbody = document.getElementById('productsTableBody');
            tbody.innerHTML = '';
            
            if (products.length === 0) {
                tbody.innerHTML = '<tr class="empty-row"><td colspan="7">📭 No products found. Add your first product above!</td></tr>';
                return;
            }
            
            products.forEach(product => {
                const row = tbody.insertRow();
                row.innerHTML = `
                    <td>${product.id}</td>
                    <td><strong>${escapeHtml(product.name)}</strong></td>
                    <td>${escapeHtml(product.description || '-')}</td>
                    <td>$${parseFloat(product.price).toFixed(2)}</td>
                    <td>${product.quantity}</td>
                    <td>${escapeHtml(product.category || '-')}</td>
                    <td class="actions">
                        <button class="btn btn-edit" onclick="openEditModal(${product.id})">✏️ Edit</button>
                        <button class="btn btn-danger" onclick="deleteProduct(${product.id})">🗑️ Delete</button>
                    </td>
                `;
            });
        }
        
        // Add product with validation
        async function addProduct(event) {
            event.preventDefault();
            
            const price = parseFloat(document.getElementById('productPrice').value);
            const quantity = parseInt(document.getElementById('productQty').value) || 0;
            
            // Client-side validation
            if (!validateProduct(price, quantity, false)) {
                return;
            }
            
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Adding...';
            
            const productData = {
                name: document.getElementById('productName').value.trim(),
                description: document.getElementById('productDesc').value.trim(),
                price: price,
                quantity: quantity,
                category: document.getElementById('productCat').value
            };
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(productData)
                });
                
                const result = await response.json();
                
                if (result.status === 'success') {
                    showAlert(`✅ Product "${productData.name}" added successfully!`, 'success');
                    document.getElementById('addProductForm').reset();
                    document.getElementById('productQty').value = 0;
                    if (inventoryVisible) {
                        await loadProductsForInventory();
                    }
                } else {
                    const errorMsg = result.errors ? result.errors.join(', ') : result.message;
                    showAlert(`❌ Failed: ${errorMsg}`, 'error');
                }
            } catch (error) {
                console.error('Error adding product:', error);
                showAlert('❌ Network error. Check if XAMPP is running.', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-save"></i> Add Product';
            }
        }
        
        // Delete product
        async function deleteProduct(productId) {
            if (!confirm('⚠️ Are you sure you want to delete this product?')) {
                return;
            }
            
            try {
                const response = await fetch(`${API_URL}?id=${productId}`, {
                    method: 'DELETE'
                });
                
                const result = await response.json();
                
                if (result.status === 'success') {
                    showAlert(`✅ Product deleted successfully!`, 'success');
                    if (inventoryVisible) {
                        await loadProductsForInventory();
                    }
                } else {
                    showAlert(`❌ Delete failed: ${result.message}`, 'error');
                }
            } catch (error) {
                console.error('Error deleting product:', error);
                showAlert('❌ Network error', 'error');
            }
        }
        
        // Open edit modal
        async function openEditModal(productId) {
            try {
                const response = await fetch(`${API_URL}?id=${productId}`);
                const result = await response.json();
                
                if (result.status === 'success') {
                    const product = result.data;
                    document.getElementById('editProductId').value = product.id;
                    document.getElementById('editName').value = product.name;
                    document.getElementById('editDesc').value = product.description || '';
                    document.getElementById('editPrice').value = product.price;
                    document.getElementById('editQty').value = product.quantity;
                    document.getElementById('editCat').value = product.category || 'Other';
                    
                    // Clear any previous error messages
                    document.getElementById('editNameError').textContent = '';
                    document.getElementById('editPriceError').textContent = '';
                    document.getElementById('editQuantityError').textContent = '';
                    
                    document.getElementById('editModal').style.display = 'flex';
                }
            } catch (error) {
                console.error('Error loading product for edit:', error);
                showAlert('❌ Failed to load product details', 'error');
            }
        }
        
        // Update product with validation
        async function updateProduct(event) {
            event.preventDefault();
            
            const productId = document.getElementById('editProductId').value;
            const price = parseFloat(document.getElementById('editPrice').value);
            const quantity = parseInt(document.getElementById('editQty').value) || 0;
            
            // Client-side validation
            if (!validateProduct(price, quantity, true)) {
                return;
            }
            
            const productData = {
                name: document.getElementById('editName').value.trim(),
                description: document.getElementById('editDesc').value.trim(),
                price: price,
                quantity: quantity,
                category: document.getElementById('editCat').value
            };
            
            try {
                const response = await fetch(`${API_URL}?id=${productId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(productData)
                });
                
                const result = await response.json();
                
                if (result.status === 'success') {
                    showAlert(`✅ Product updated successfully!`, 'success');
                    closeEditModal();
                    if (inventoryVisible) {
                        await loadProductsForInventory();
                    }
                } else {
                    const errorMsg = result.errors ? result.errors.join(', ') : result.message;
                    showAlert(`❌ Update failed: ${errorMsg}`, 'error');
                }
            } catch (error) {
                console.error('Error updating product:', error);
                showAlert('❌ Network error', 'error');
            }
        }
        
        // Close edit modal
        function closeEditModal() {
            document.getElementById('editModal').style.display = 'none';
            document.getElementById('editProductForm').reset();
        }
        
        // Logout function
        function logout() {
            localStorage.removeItem('admin_logged_in');
            localStorage.removeItem('admin_email');
            localStorage.removeItem('admin_name');
            window.location.href = 'admin_login.html';
        }
        
        // Helper function
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Initialize event listeners
        document.addEventListener('DOMContentLoaded', () => {
            displayAdminName();
            
            const addForm = document.getElementById('addProductForm');
            if (addForm) addForm.addEventListener('submit', addProduct);
            
            const editForm = document.getElementById('editProductForm');
            if (editForm) editForm.addEventListener('submit', updateProduct);
            
            const toggleBtn = document.getElementById('toggleInventoryBtn');
            if (toggleBtn) toggleBtn.addEventListener('click', toggleInventory);
        });
        
        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('editModal');
            if (event.target === modal) {
                closeEditModal();
            }
        }
        
        // Real-time validation for price field (prevent negative)
        document.addEventListener('DOMContentLoaded', function() {
            const priceInput = document.getElementById('productPrice');
            if (priceInput) {
                priceInput.addEventListener('input', function() {
                    if (this.value < 0) this.value = 0;
                });
            }
            
            const qtyInput = document.getElementById('productQty');
            if (qtyInput) {
                qtyInput.addEventListener('input', function() {
                    if (this.value < 0) this.value = 0;
                });
            }
            
            const editPriceInput = document.getElementById('editPrice');
            if (editPriceInput) {
                editPriceInput.addEventListener('input', function() {
                    if (this.value < 0) this.value = 0;
                });
            }
            
            const editQtyInput = document.getElementById('editQty');
            if (editQtyInput) {
                editQtyInput.addEventListener('input', function() {
                    if (this.value < 0) this.value = 0;
                });
            }
        });
    </script>
</body>
</html>
