# Selenium Grid 4 — hub + Chrome and Firefox nodes.
# Matches the Selenium 4.15.0 client used in pom.xml and the tests' hub URL (http://localhost:4444).
#
#   docker compose up -d        # start the grid
#   http://localhost:4444/ui    # grid console
#   docker compose down         # stop the grid
#
# From inside the node containers the host machine's XAMPP app is reachable at
# http://host.docker.internal/ecommerce_api/  (used by tests/grid/demo/ParallelGridTest.java).

services:
  selenium-hub:
    image: selenium/hub:4.15.0
    container_name: selenium-hub
    ports:
      - "4442:4442"   # event bus publish
      - "4443:4443"   # event bus subscribe
      - "4444:4444"   # hub / WebDriver endpoint + console

  chrome:
    image: selenium/node-chrome:4.15.0
    shm_size: 2gb
    depends_on:
      - selenium-hub
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_MAX_SESSIONS=2
      - SE_NODE_OVERRIDE_MAX_SESSIONS=true
    extra_hosts:
      - "host.docker.internal:host-gateway"

  firefox:
    image: selenium/node-firefox:4.15.0
    shm_size: 2gb
    depends_on:
      - selenium-hub
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_MAX_SESSIONS=2
      - SE_NODE_OVERRIDE_MAX_SESSIONS=true
    extra_hosts:
      - "host.docker.internal:host-gateway"
